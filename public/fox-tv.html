<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fox — Planta Santa Lucía</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap');
 
* { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --red:    #FF2D2D;
  --green:  #00E676;
  --bg:     #060C18;
  --panel:  #0B1423;
  --card:   #101D30;
  --border: #1A2D4A;
}
 
body {
  background: var(--bg);
  font-family: 'Inter', system-ui, sans-serif;
  color: #FFFFFF;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
 
/* ═══ HEADER ═══════════════════════════════════════════ */
header {
  background: #050A14;
  border-bottom: 3px solid var(--red);
  padding: 0 40px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 14px; }
.logo-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 900;
}
.logo-title { font-size: 21px; font-weight: 800; }
.logo-sub { font-size: 12px; color: #FF8080; margin-top: 1px; letter-spacing: .5px; }
 
.header-right { display: flex; align-items: center; gap: 32px; }
 
/* stats inline */
.hstat { display: flex; align-items: center; gap: 8px; }
.hstat-dot { width: 9px; height: 9px; border-radius: 50%; }
.hstat-lbl { font-size: 13px; color: #607090; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.hstat-val { font-size: 28px; font-weight: 900; line-height: 1; }
 
.divider { width: 1px; height: 32px; background: var(--border); }
 
.clock-wrap { text-align: right; }
.clock { font-size: 32px; font-weight: 900; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
.clock-date { font-size: 12px; color: #607090; margin-top: 2px; text-transform: capitalize; }
 
/* ═══ SEDE LABEL ════════════════════════════════════════ */
.sede-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 40px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.sede-pill {
  background: #7C3AED;
  color: #fff;
  font-size: 13px; font-weight: 800;
  padding: 4px 14px; border-radius: 999px;
  text-transform: uppercase; letter-spacing: 1px;
}
.sede-label { font-size: 14px; font-weight: 700; color: #607090; }
 
/* ═══ GRID ══════════════════════════════════════════════ */
.grid {
  flex: 1;
  overflow-y: auto;
  padding: 20px 32px 24px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
  align-content: start;
}
.grid::-webkit-scrollbar { width: 4px; }
.grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 
/* ═══ MACHINE CARD ══════════════════════════════════════ */
.mcard {
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid var(--border);
  background: var(--card);
  display: flex;
  flex-direction: column;
}
 
/* OCCUPIED */
.mcard.busy {
  border-color: var(--red);
  background: #110A0A;
  box-shadow: 0 0 0 1px rgba(255,45,45,.15), 0 8px 32px rgba(255,45,45,.12);
}
 
/* FREE */
.mcard.free {
  border-color: #0D3320;
  background: #080F0A;
}
 
/* header strip */
.mcard-strip {
  height: 6px;
}
.mcard.busy  .mcard-strip { background: var(--red); }
.mcard.free  .mcard-strip { background: var(--green); }
 
.mcard-head {
  padding: 14px 16px 10px;
  display: flex; align-items: flex-start; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.mcard-name { font-size: 17px; font-weight: 800; }
.mcard-lbl  { font-size: 12px; color: #607090; margin-top: 2px; }
.status-chip {
  font-size: 11px; font-weight: 800;
  border-radius: 999px; padding: 4px 11px;
  white-space: nowrap; letter-spacing: .5px; text-transform: uppercase;
}
.busy-chip  { background: rgba(255,45,45,.2);  color: #FF6B6B; }
.free-chip  { background: rgba(0,230,118,.12); color: var(--green); }
 
.mcard-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
 
/* FREE state */
.free-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 0;
}
.free-check { font-size: 34px; color: var(--green); margin-bottom: 6px; }
.free-txt   { font-size: 16px; font-weight: 800; color: var(--green); }
 
/* PRODUCT inside card */
.prod {
  background: rgba(0,0,0,.4);
  border-radius: 10px;
  padding: 10px 12px;
  border-left: 3px solid var(--red);
}
.prod-top {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 6px;
}
.prod-badge {
  font-size: 11px; font-weight: 800; border-radius: 999px;
  padding: 3px 10px;
}
.prod-ago { font-size: 11px; color: #607090; }
.prod-num  { font-size: 28px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.prod-cli  { font-size: 14px; font-weight: 700; color: #90B4D8; margin-top: 3px; }
.prod-info { font-size: 11px; color: #506070; margin-top: 5px; line-height: 1.5; }
 
/* PRODUCT TYPE COLORS */
.t-esl { background: rgba(59,130,246,.2);  color: #7DC4FF; }
.t-pvc { background: rgba(0,230,118,.15);  color: #5DFFB0; }
.t-pos { background: rgba(251,146,60,.18); color: #FFB06B; }
.t-tub { background: rgba(168,85,247,.18); color: #CC88FF; }
 
/* ═══ ANIMATIONS ════════════════════════════════════════ */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.pulse { animation: pulse 2.5s ease-in-out infinite; }
 
@keyframes spin { to{transform:rotate(360deg)} }
 
@keyframes redglow {
  0%,100% { box-shadow: 0 0 0 1px rgba(255,45,45,.15), 0 8px 32px rgba(255,45,45,.08); }
  50%     { box-shadow: 0 0 0 1px rgba(255,45,45,.3),  0 8px 40px rgba(255,45,45,.22); }
}
.mcard.busy { animation: redglow 3.5s ease-in-out infinite; }
 
/* ═══ LOADING ════════════════════════════════════════════ */
#loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px;
  background: var(--bg); z-index: 99;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
</style>
</head>
<body>
 
<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:15px;color:#607090">Conectando con Firebase...</div>
</div>
 
<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">F</div>
    <div>
      <div class="logo-title">Mallas y Alambres Fox</div>
      <div class="logo-sub">Panel de Producción · Tiempo Real</div>
    </div>
  </div>
  <div class="header-right">
    <div class="hstat">
      <div class="hstat-dot" style="background:var(--green)"></div>
      <span class="hstat-lbl">Libres</span>
      <span class="hstat-val" id="sFree" style="color:var(--green)">—</span>
    </div>
    <div class="divider"></div>
    <div class="hstat">
      <div class="hstat-dot" style="background:var(--red)"></div>
      <span class="hstat-lbl">Activos</span>
      <span class="hstat-val" id="sAct" style="color:#FF6B6B">—</span>
    </div>
    <div class="divider"></div>
    <div class="hstat">
      <div class="hstat-dot" style="background:#60A5FA"></div>
      <span class="hstat-lbl">Cola</span>
      <span class="hstat-val" id="sQ" style="color:#60A5FA">—</span>
    </div>
    <div class="divider"></div>
    <div class="hstat">
      <div class="hstat-dot" style="background:#A3E635"></div>
      <span class="hstat-lbl">Completadas</span>
      <span class="hstat-val" id="sDone" style="color:#A3E635">—</span>
    </div>
    <div class="divider"></div>
    <div class="clock-wrap">
      <div class="clock" id="clock">--:--:--</div>
      <div class="clock-date" id="cdate">--</div>
    </div>
  </div>
</header>
 
<!-- SEDE BAR -->
<div class="sede-bar">
  <div class="sede-pill">Santa Lucía</div>
  <div class="sede-label" id="machSummary">Cargando...</div>
</div>
 
<!-- GRID -->
<div class="grid" id="grid"></div>
 
<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, collection, query, orderBy, onSnapshot }
       from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
 
/* ── Firebase ─────────────────────────────────────────── */
const app = initializeApp({
  apiKey:            "AIzaSyABPktv7Jfpc9UjmFl13QzrsSwVK34zCO0",
  authDomain:        "fox-produccion.firebaseapp.com",
  projectId:         "fox-produccion",
  storageBucket:     "fox-produccion.firebasestorage.app",
  messagingSenderId: "614815300879",
  appId:             "1:614815300879:web:137a1e22a35e6ced7ed27a"
});
const db = getFirestore(app);
 
/* ── Config ───────────────────────────────────────────── */
const MACHINES = [
  { id:"SL1", label:"SL-1", name:"Máquina 1" },
  { id:"SL2", label:"SL-2", name:"Máquina 2" },
  { id:"SL3", label:"SL-3", name:"Máquina 3" },
  { id:"SL4", label:"SL-4", name:"Máquina 4" },
  { id:"SL5", label:"SL-5", name:"Máquina 5" },
];
 
const PROD = {
  eslabonada: { l:"Malla Eslabonada", cls:"t-esl" },
  pvc:        { l:"Malla PVC",        cls:"t-pvc" },
  postes:     { l:"Postes",           cls:"t-pos" },
  tubos:      { l:"Tubos",            cls:"t-tub" },
};
const lp  = id => PROD[id]?.l   || id || '';
const cls = id => PROD[id]?.cls || 't-esl';
 
/* ── Helpers ──────────────────────────────────────────── */
function norm(o) {
  const b = o.status==='completed'?'completed':o.status==='active'?'active':'queue';
  if (Array.isArray(o.items) && o.items.length)
    return o.items.map(it => ({
      ...it,
      status:     it.status     !==undefined ? it.status     : b,
      machineId:  it.machineId  !==undefined ? it.machineId  : (o.machineId  ||null),
      assignedAt: it.assignedAt !==undefined ? it.assignedAt : (o.assignedAt ||null),
    }));
  if (o.producto) return [{ ...o, status:b, machineId: o.machineId||null }];
  return [];
}
 
function derSt(items) {
  if (!items?.length) return 'queue';
  if (items.every(i => i.status==='completed')) return 'completed';
  if (items.some(i  => i.status==='active'||i.status==='completed')) return 'active';
  return 'queue';
}
 
function ago(ts) {
  if (!ts) return '';
  const m = Math.floor((Date.now()-ts)/60000);
  if (m < 1)  return 'ahora';
  if (m < 60) return m+'min';
  const h = Math.floor(m/60);
  return h < 24 ? h+'h' : Math.floor(h/24)+'d';
}
 
function params(it) {
  if (!it?.producto) return '';
  const p = [];
  if (it.producto==='eslabonada'||it.producto==='pvc') {
    if (it.metros)            p.push(it.metros + 'm²');
    if (it.ancho && it.alto)  p.push(it.ancho + '×' + it.alto + 'm');
    if (it.abertura)          p.push('Ab: ' + it.abertura);
    if (it.calibre)           p.push('Cal: ' + it.calibre);
    if (it.color)             p.push(it.color);
  } else {
    if (it.calibre)   p.push('Cal: ' + it.calibre);
    if (it.grosor)    p.push(it.grosor + '"');
    if (it.largo)     p.push(it.largo + 'm');
    if (it.cantidad)  p.push(it.cantidad + ' un');
  }
  return p.join('  ·  ');
}
 
/* ── Clock ────────────────────────────────────────────── */
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('cdate').textContent =
    n.toLocaleDateString('es-CO', {weekday:'long',day:'numeric',month:'long'});
}
tick(); setInterval(tick, 1000);
 
/* ── Render ───────────────────────────────────────────── */
function render(orders) {
  const allItems = orders.flatMap(o => norm(o));
  const active   = allItems.filter(it => it.status === 'active');
  const slActive = active.filter(it => MACHINES.some(m => m.id === it.machineId));
  const free     = MACHINES.filter(m => !active.some(it => it.machineId === m.id));
  const queueO   = orders.filter(o => derSt(norm(o)) !== 'completed');
  const doneO    = orders.filter(o => derSt(norm(o)) === 'completed');
 
  /* stats */
  document.getElementById('sFree').textContent  = free.length;
  document.getElementById('sAct').textContent   = slActive.length;
  document.getElementById('sQ').textContent     = queueO.length;
  document.getElementById('sDone').textContent  = doneO.length;
  document.getElementById('machSummary').textContent =
    `${MACHINES.length - free.length} de ${MACHINES.length} máquinas en uso  ·  Act. ${new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}`;
 
  /* grid */
  let html = '';
  MACHINES.forEach(m => {
    const mItems = active.filter(it => it.machineId === m.id);
    const busy   = mItems.length > 0;
 
    html += `<div class="mcard ${busy?'busy':'free'}">
      <div class="mcard-strip"></div>
      <div class="mcard-head">
        <div>
          <div class="mcard-name">${m.name}</div>
          <div class="mcard-lbl">${m.label}</div>
        </div>
        <div class="status-chip ${busy?'busy-chip':'free-chip'}">
          ${busy ? mItems.length+' activo'+(mItems.length>1?'s':'') : 'libre'}
        </div>
      </div>
      <div class="mcard-body">`;
 
    if (busy) {
      mItems.forEach(it => {
        /* find parent order */
        let par = null;
        for (const o of orders) {
          const its = norm(o);
          if (its.some(x => x.machineId===m.id && x.assignedAt===it.assignedAt)) { par=o; break; }
        }
        html += `<div class="prod">
          <div class="prod-top">
            <span class="prod-badge ${cls(it.producto)}">${lp(it.producto)}</span>
            <span class="prod-ago pulse">${ago(it.assignedAt)}</span>
          </div>
          <div class="prod-num">#${par?.orden ?? '?'}</div>
          <div class="prod-cli">${par?.cliente ?? ''}</div>
          <div class="prod-info">${params(it)}</div>
        </div>`;
      });
    } else {
      html += `<div class="free-state">
        <div class="free-check">✓</div>
        <div class="free-txt">Disponible</div>
      </div>`;
    }
 
    html += `</div></div>`;
  });
 
  document.getElementById('grid').innerHTML = html;
  document.getElementById('loading').style.display = 'none';
}
 
/* ── Firebase listener ────────────────────────────────── */
onSnapshot(
  query(collection(db,'orders'), orderBy('timestamp','desc')),
  snap => render(snap.docs.map(d => ({...d.data(), _id:d.id}))),
  err  => {
    document.getElementById('loading').innerHTML =
      `<div style="color:#FF6B6B;font-size:16px">&#10060; ${err.message}</div>`;
  }
);
</script>
</body>
</html>
